<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSAI Live Demo — See It Work For You</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b; --bg-card: #111113; --bg-card-hover: #18181b;
  --border: #27272a; --text: #fafafa; --text-dim: #a1a1aa; --text-muted: #71717a;
  --accent: #f97316; --accent-glow: rgba(249,115,22,0.15);
  --accent2: #3b82f6; --accent3: #10b981;
  --gradient: linear-gradient(135deg, #f97316, #fb923c, #f59e0b);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

nav {
  padding: 16px 32px; background: rgba(10,10,11,0.9);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-weight: 800; font-size: 1.1rem; }
.logo span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.back { color: var(--text-dim); text-decoration: none; font-size: 0.85rem; font-weight: 500; }
.back:hover { color: var(--text); }

.hero { text-align: center; padding: 60px 24px 40px; }
.hero h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900; letter-spacing: -0.03em; margin-bottom: 12px; }
.hero h1 span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero p { color: var(--text-dim); font-size: 1rem; max-width: 500px; margin: 0 auto; }

.demo-container { max-width: 800px; margin: 0 auto; padding: 0 24px 80px; }

/* Input Form */
.input-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 16px; padding: 32px; margin-bottom: 24px;
}
.input-card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-group label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }
select, input[type=text] {
  background: #18181b; border: 1px solid var(--border);
  color: var(--text); padding: 12px 14px; border-radius: 10px;
  font-size: 0.9rem; font-family: 'Inter', sans-serif;
  outline: none; transition: border-color 0.2s;
  -webkit-appearance: none;
}
select:focus, input[type=text]:focus { border-color: var(--accent); }
select option { background: #18181b; }
.run-btn {
  width: 100%; padding: 14px; border-radius: 12px;
  background: var(--gradient); color: #000;
  font-weight: 700; font-size: 1rem; font-family: 'Inter', sans-serif;
  border: none; cursor: pointer; margin-top: 8px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.run-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
.run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Terminal */
.terminal { display: none; }
.terminal.visible { display: block; }
.terminal-wrap {
  border-radius: 16px; border: 1px solid var(--border);
  background: var(--bg-card); overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.terminal-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px; background: #18181b;
  border-bottom: 1px solid var(--border);
}
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot.r { background: #ef4444; } .dot.y { background: #eab308; } .dot.g { background: #22c55e; }
.terminal-title { flex:1; text-align:center; font-size:0.75rem; color:var(--text-muted); font-family:'JetBrains Mono',monospace; }
.terminal-body { padding: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; line-height: 1.9; min-height: 300px; }
.line { display: block; }
.line.hidden { display: none; }
.prompt { color: var(--accent); }
.cmd { color: var(--text); }
.output { color: var(--text-dim); }
.success { color: var(--accent3); }
.info { color: var(--accent2); }
.warning { color: #f59e0b; }
.cursor { display: inline-block; width: 8px; height: 14px; background: var(--accent); animation: blink 1s infinite; vertical-align: middle; }
@keyframes blink { 0%,50% { opacity:1; } 51%,100% { opacity:0; } }

.cta-after {
  margin-top: 20px; padding: 20px 24px;
  background: var(--bg-card); border: 1px solid var(--accent);
  border-radius: 12px; text-align: center;
  box-shadow: 0 0 30px var(--accent-glow);
}
.cta-after p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 14px; }
.cta-after a {
  display: inline-block; background: var(--gradient); color: #000;
  font-weight: 700; padding: 12px 28px; border-radius: 10px;
  text-decoration: none; font-size: 0.95rem;
}

@media(max-width:600px) { .form-row { grid-template-columns: 1fr; } }
</style>

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeLines(lines) {
  const body = document.getElementById('termBody');
  body.innerHTML = '';
  for (let i = 0; i < lines.length; i++) {
    const [type, text] = lines[i];
    const span = document.createElement('span');
    span.className = 'line';
    if (type === 'prompt') {
      span.innerHTML = `<span class="prompt">nsai › </span><span class="cmd">${text}</span>`;
    } else {
      span.innerHTML = `<span class="${type}">${text}</span>`;
    }
    body.appendChild(span);
    body.appendChild(document.createTextNode('\n'));
    await sleep(type === 'prompt' ? 600 : 350);
    body.scrollTop = body.scrollHeight;
  }
  // Show cursor
  const cur = document.createElement('span');
  cur.className = 'cursor';
  body.appendChild(cur);
  await sleep(800);
  // Show CTA
  document.getElementById('ctaAfter').style.display = 'block';
}

function runDemo() {
  const role = document.getElementById('role').value;
  const task = document.getElementById('task').value;
  const name = document.getElementById('name').value.trim();

  if (!role || !task) {
    alert('Please select your role and a pain point to continue.');
    return;
  }

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Running demo...';

  const termTitle = document.getElementById('termTitle');
  termTitle.textContent = `nsai — session for ${name || 'you'}`;

  document.getElementById('ctaAfter').style.display = 'none';

  const lines = (DEMOS[role] && DEMOS[role][task])
    ? DEMOS[role][task]
    : (DEFAULTS[task] || DEFAULTS.research);

  const terminal = document.getElementById('terminal');
  terminal.className = 'terminal visible';
  terminal.scrollIntoView({ behavior: 'smooth', block: 'start' });

  typeLines(lines).then(() => {
    btn.disabled = false;
    btn.textContent = '▶ Run Another Demo';
  });
}
